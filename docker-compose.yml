##
## docker-compose.yml — Production / integrated compose file.
##
## Orchestrates ALL services: app, postgres, minio.
## For local development (app runs with `npm run dev`), use docker-compose.dev.yml instead.
##
## Usage:
##   docker compose up -d                    # start all services
##   docker compose up -d --build            # rebuild app image and start
##   docker compose logs -f app              # follow app logs
##   docker compose down                     # stop and remove containers
##   docker compose down -v                  # also remove named volumes (destructive)
##

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiwrite_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiwrite}
      POSTGRES_USER: ${POSTGRES_USER:-aiwrite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # SSL certificates — generate with: ./docker/postgres/ssl/generate-certs.sh
      - ./docker/postgres/ssl/server.crt:/etc/postgresql/ssl/server.crt:ro
      - ./docker/postgres/ssl/server.key:/etc/postgresql/ssl/server.key:ro
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/etc/postgresql/ssl/server.crt
      -c ssl_key_file=/etc/postgresql/ssl/server.key
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiwrite} -d ${POSTGRES_DB:-aiwrite}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aiwrite_network

  # ─────────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: aiwrite_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    ports:
      # API port — exposed so the app (and clients) can reach the storage endpoint.
      - "${MINIO_PORT:-9000}:9000"
      # Console port — MinIO web UI for bucket management.
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - aiwrite_network

  # ─────────────────────────────────────────────
  # Next.js application (standalone build)
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: aiwrite_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Internal DATABASE_URL — uses service name "postgres", not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiwrite}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-aiwrite}?schema=public
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # MinIO — service communicates over internal network via service name "minio".
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-aiwrite}
      MINIO_USE_SSL: "false"
      # Public URL used by Next.js for absolute URL generation (SSR/metadata).
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - aiwrite_network

# ─────────────────────────────────────────────
# Named volumes — data persists across container restarts.
# Remove with `docker compose down -v` (destructive).
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    name: aiwrite_postgres_data
  minio_data:
    name: aiwrite_minio_data

# ─────────────────────────────────────────────
# Internal bridge network.
# Services communicate by service name (DNS resolution).
# Only explicitly mapped ports are reachable from the host.
# ─────────────────────────────────────────────
networks:
  aiwrite_network:
    driver: bridge
    name: aiwrite_network
